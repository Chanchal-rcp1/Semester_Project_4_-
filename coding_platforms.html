<!DOCTYPE html>
<html>
<head>
    <title>Coding Platforms</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            display: inline-block;
            width: 250px;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .card img {
            width: 120px;
            height: 120px;
        }

        .card a {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>💻 Coding Platforms</h1>

<div class="container">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/LeetCode_logo_black.png">
        <h3>LeetCode</h3>
        <a href="https://leetcode.com" target="_blank">Visit Website</a>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/65/HackerRank_logo.png">
        <h3>HackerRank</h3>
        <a href="https://www.hackerrank.com" target="_blank">Visit Website</a>
    </div>

    <div class="card">
    <img src="https://cdn.codechef.com/images/cc-logo.svg">
    <h3>CodeChef</h3>
    <a href="https://www.codechef.com" target="_blank">Visit Website</a>
</div>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/43/GeeksforGeeks.svg" alt="GeeksforGeeks Logo">
    <h3>GeeksforGeeks</h3>
    <a href="https://www.geeksforgeeks.org/" target="_blank">Visit Website</a>
</div>
</div>
</div>

</body>
</html>
