<!DOCTYPE html>
<html>
<head>
    <title>Select Category</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .tech { background: linear-gradient(45deg, #36d1dc, #5b86e5); }
        .apt { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .int { background: linear-gradient(45deg, #f7971e, #ffd200); }
        .profile { background: linear-gradient(45deg, #8e2de2, #4a00e0); }
        .company { background: linear-gradient(45deg, #ff416c, #ff4b2b); }

        .btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        .icon {
            margin-right: 10px;
        }

        .back-btn {
            margin-top: 20px;
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
        }

        .back-btn:hover {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 Select Category to Add Content</h2>

        <a href="/add_content/technical" class="btn tech">
            💻 Technical
        </a>

        <a href="/add_content/aptitude" class="btn apt">
            🧠 Aptitude
        </a>

        <a href="/add_content/interview_skills" class="btn int">
            🎤 Interview Skills
        </a>

        <a href="/add_content/online_profile" class="btn profile">
            🌐 Online Profile
        </a>

        <a href="/add_content/company_wise" class="btn company">
            🏢 Company Wise
        </a>

        <a href="/admin_dashboard" class="back-btn">⬅ Back to Dashboard</a>
    </div>

</body>
</html>
