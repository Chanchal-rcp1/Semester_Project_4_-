<!DOCTYPE html>
<html>
<head>
    <title>Technical Practice</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 40px;
            color: white;
            text-align: center;
        }

        .card-container {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            width: 250px;
            border-radius: 15px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .back-btn {
            margin-top: 60px;
            display: inline-block;
            padding: 10px 20px;
            background: #e74a3b;
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>💻 Technical Practice Section</h1>
    <p>Select a section to start preparation</p>

    <div class="card-container">

        <a href="{{ url_for('year_roadmap') }}">
            <div class="card">
                <h3>📍 Year-wise Roadmap</h3>
                <p>Complete DSA guide for all years</p>
            </div>
        </a>

        <a href="{{ url_for('operating_system') }}">
            <div class="card">
                <h3>💻 Operating System</h3>
                <p>OS concepts & interview prep</p>
            </div>
        </a>

        <a href="{{ url_for('database') }}">
            <div class="card">
                <h3>🗄 Database (DBMS)</h3>
                <p>SQL, Normalization, Queries</p>
            </div>
        </a>

        <a href="{{ url_for('coding_platforms') }}">
    <div class="card">
        <h3>💻 Coding Platforms</h3>
        <p>LeetCode, CodeChef, HackerRank & More</p>
    </div>
</a>

    </div>

    <a href="/student_dashboard" class="back-btn">⬅ Back to Dashboard</a>

</body>
</html>
