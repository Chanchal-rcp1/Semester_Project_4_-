<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            color: white;
            padding: 20px;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #5a67d8;
            color: white;
        }

        tr:hover {
            background-color: #f2f2f2;
        }

        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #e63946;
        }
    </style>
</head>
<body>

    <h1>Registered Students</h1>

    {% if students %}
    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <h3 style="color:white;">No students registered yet.</h3>
    {% endif %}

    <a href="/admin_dashboard">
        <button class="back-btn">Back to Dashboard</button>
    </a>

</body>
</html>
